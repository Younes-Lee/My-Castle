<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>글로벌구매팀 제조원가 개선 활동 현황판 (모바일)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root{
    --bg:#16191c;
    --bg-soft:#1d2226;
    --panel:#21262b;
    --panel-2:#262c31;
    --line: rgba(255,255,255,0.07);
    --line-strong: rgba(255,255,255,0.14);
    --ink:#eceae4;
    --ink-dim:#9aa0a6;
    --ink-faint:#6b7178;
    --amber:#e8965a;
    --amber-soft: rgba(232,150,90,0.16);
    --moss:#7fa56f;
    --moss-soft: rgba(127,165,111,0.16);
    --clay:#c2624a;
    --clay-soft: rgba(194,98,74,0.16);
    --wheat:#d9c189;
    --orion-red:#e2001a;
    --orion-red-soft: rgba(226,0,26,0.16);
    --s1:#5b8ac9;
    --s2:#3fb5b0;
    --s3:#d9c189;
    --s4:#e8965a;
    --s5:#c2624a;
    --s6:#7fa56f;
    --font-display:'Space Grotesk', 'Noto Sans KR', sans-serif;
    --font-body:'Noto Sans KR', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
  }

  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:calc(16px + var(--safe-top)) 16px calc(28px + var(--safe-bottom));
  }

  /* ---------- HEADER ---------- */
  .topbar{
    margin-bottom:18px;
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--orion-red);
    margin-bottom:6px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    line-height:1.3;
    letter-spacing:-0.01em;
    margin:0 0 10px;
    color:var(--ink);
  }
  .sub{
    font-size:13px;
    color:var(--ink-dim);
    margin-bottom:14px;
  }
  .meta-row{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .pill{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-dim);
    background:var(--panel);
    border:1px solid var(--line);
    padding:6px 11px;
    border-radius:100px;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .pill .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--moss);
    box-shadow:0 0 0 3px var(--moss-soft);
  }
  .pill.live .dot{ animation: pulse 2s infinite; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(127,165,111,0.5); }
    70%{ box-shadow:0 0 0 6px rgba(127,165,111,0); }
    100%{ box-shadow:0 0 0 0 rgba(127,165,111,0); }
  }
  .refresh-btn{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink);
    background:var(--panel-2);
    border:1px solid var(--line-strong);
    padding:6px 13px;
    border-radius:100px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    text-decoration:none;
  }
  .refresh-btn:active{ border-color:var(--orion-red); }
  #refreshBtn{ margin-left:auto; }

  /* ---------- KPI: horizontal scroll snap ---------- */
  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:7px;
    margin-bottom:18px;
  }
  .kpi{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 9px;
    position:relative;
    overflow:hidden;
    min-width:0;
  }
  .kpi::before{
    content:'';
    position:absolute; top:0; left:0; width:100%; height:3px;
    background:var(--accent, var(--amber));
  }
  .kpi .label{
    font-size:9.5px;
    color:var(--ink-dim);
    margin-bottom:6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.25;
  }
  .kpi .value{
    font-family:var(--font-mono);
    font-weight:600;
    font-size:18px;
    color:var(--ink);
    letter-spacing:-0.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .kpi .value .unit{
    font-size:10px;
    color:var(--ink-dim);
    margin-left:2px;
    font-family:var(--font-body);
  }
  .kpi .footnote{
    margin-top:5px;
    font-size:9px;
    color:var(--ink-faint);
    line-height:1.25;
  }
  .kpi.amber{ --accent: var(--amber); }
  .kpi.clay{ --accent: var(--clay); }
  .kpi.moss{ --accent: var(--moss); }
  .kpi.wheat{ --accent: var(--wheat); }
  .kpi.orion{ --accent: var(--orion-red); }

  /* ---------- SECTION HEAD ---------- */
  .section-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:10px; margin-top:4px;
  }
  .section-head h2{
    font-family:var(--font-display);
    font-size:15px; font-weight:600;
    margin:0;
    color:var(--ink);
  }
  .section-head .hint{
    font-size:11px; color:var(--ink-faint);
  }

  /* ---------- PIPELINE: 3x2 grid ---------- */
  .pipeline-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin-bottom:20px;
  }
  .stage{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 10px 11px;
    position:relative;
    overflow:hidden;
    min-width:0;
  }
  .stage::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:3px;
    background: var(--stage-color, var(--amber));
  }
  .stage.s1{ --stage-color: var(--s1); }
  .stage.s2{ --stage-color: var(--s2); }
  .stage.s3{ --stage-color: var(--s3); }
  .stage.s4{ --stage-color: var(--s4); }
  .stage.s5{ --stage-color: var(--s5); }
  .stage.s6{ --stage-color: var(--s6); }
  .stage .num{
    font-family:var(--font-mono);
    font-size:9.5px;
    color: var(--stage-color, var(--ink-faint));
  }
  .stage .name{
    font-family:var(--font-display);
    font-weight:600;
    font-size:11px;
    margin:4px 0 8px;
    color:var(--ink);
    min-height:28px;
    line-height:1.28;
    word-break:keep-all;
  }
  .stage .count{
    font-family:var(--font-mono);
    font-size:19px;
    font-weight:600;
    color:var(--ink);
  }
  .stage .count .of{
    font-size:10px; color:var(--ink-faint); font-family:var(--font-body);
  }
  .stage .bar-track{
    height:4px; background:rgba(255,255,255,0.06); border-radius:4px; margin-top:8px; overflow:hidden;
  }
  .stage .bar-fill{
    height:100%; border-radius:4px;
    background: var(--stage-color, var(--amber));
  }

  /* ---------- FILTER ---------- */
  .filter-scroll{
    display:flex; gap:7px; overflow-x:auto;
    margin:0 -16px 12px;
    padding:2px 16px 4px;
    -webkit-overflow-scrolling:touch;
  }
  .filter-scroll::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto;
    font-family:var(--font-mono);
    font-size:12.5px;
    padding:7px 14px;
    border-radius:100px;
    border:1px solid var(--line-strong);
    background:transparent;
    color:var(--ink-dim);
    white-space:nowrap;
  }
  .chip.active{
    background:var(--orion-red-soft);
    border-color:var(--orion-red);
    color:#ff5468;
  }
  .search-input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line-strong);
    border-radius:100px;
    padding:11px 16px;
    color:var(--ink);
    font-family:var(--font-body);
    font-size:14px;
    outline:none;
    margin-bottom:14px;
  }
  .search-input::placeholder{ color:var(--ink-faint); }
  .search-input:focus{ border-color:var(--orion-red); }

  /* ---------- SORT BAR ---------- */
  .sort-row{
    display:flex; gap:7px; overflow-x:auto;
    margin:0 -16px 14px;
    padding:2px 16px 4px;
    -webkit-overflow-scrolling:touch;
  }
  .sort-row::-webkit-scrollbar{ display:none; }
  .sort-chip{
    flex:0 0 auto;
    font-family:var(--font-mono);
    font-size:11.5px;
    padding:6px 12px;
    border-radius:100px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink-faint);
    white-space:nowrap;
    display:flex; align-items:center; gap:4px;
  }
  .sort-chip.active{
    color:var(--ink);
    border-color:var(--line-strong);
  }
  .sort-chip .arrow{ font-size:10px; }

  /* ---------- CARDS ---------- */
  .card-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .task-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 15px;
  }
  .card-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:10px; margin-bottom:8px;
  }
  .card-no{
    font-family:var(--font-mono); color:var(--ink-faint); font-size:12px;
    flex-shrink:0; padding-top:2px;
  }
  .card-title{
    font-weight:600; font-size:15px; line-height:1.4; color:var(--ink);
    flex:1;
  }
  .badge{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:11px;
    padding:3px 9px;
    border-radius:6px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .badge.cat-통합구매{ background:rgba(216,178,108,0.14); color:#d8b26c; }
  .badge.cat-원가절감{ background:var(--moss-soft); color:var(--moss); }
  .badge.cat-인상방어{ background:var(--clay-soft); color:var(--clay); }
  .badge.cat-수급안정{ background:rgba(120,150,200,0.16); color:#8fb0d9; }

  .card-meta{
    display:flex; flex-wrap:wrap; gap:6px 14px;
    font-size:12.5px; color:var(--ink-dim);
    margin-bottom:10px;
  }
  .card-meta .meta-item{ display:flex; gap:5px; align-items:baseline; }
  .card-meta .meta-label{ color:var(--ink-faint); font-size:11px; }
  .meta-item .unassigned{ color:var(--ink-faint); font-style:italic; }

  .card-stage{
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .card-stage .stage-pip{ display:flex; gap:3px; }
  .card-stage .stage-pip i{
    width:16px; height:7px; border-radius:2px;
    background: rgba(255,255,255,0.08);
    flex-shrink:0;
  }
  .card-stage .stage-pip i.on.p1{ background: var(--s1); }
  .card-stage .stage-pip i.on.p2{ background: var(--s2); }
  .card-stage .stage-pip i.on.p3{ background: var(--s3); }
  .card-stage .stage-pip i.on.p4{ background: var(--s4); }
  .card-stage .stage-pip i.on.p5{ background: var(--s5); }
  .card-stage .stage-pip i.on.p6{ background: var(--s6); }
  .card-stage .stage-label{ font-size:12px; color:var(--ink-dim); }

  .card-amounts{
    display:flex; gap:10px; margin-bottom:10px;
  }
  .amt-box{
    flex:1;
    background:var(--panel-2);
    border-radius:10px;
    padding:8px 10px;
  }
  .amt-box .amt-label{ font-size:10.5px; color:var(--ink-faint); margin-bottom:3px; }
  .amt-box .amt-value{
    font-family:var(--font-mono); font-weight:600; font-size:16px;
  }
  .amt-value.neg{ color:var(--clay); }
  .amt-value.pos{ color:var(--moss); }
  .amt-value.zero{ color:var(--ink-faint); }

  .card-status{
    font-size:13px; color:var(--ink-dim); line-height:1.45;
    padding-top:8px;
    border-top:1px solid var(--line);
  }

  .empty-state{
    text-align:center; padding:50px 16px; color:var(--ink-faint);
  }
  .empty-state .big{ font-size:28px; margin-bottom:8px; }

  footer{
    text-align:center; padding-top:6px; color:var(--ink-faint); font-size:10.5px; font-family:var(--font-mono);
  }

  ::-webkit-scrollbar{ height:0; width:0; }
</style>
</head>

<div class="wrap">

/* ============== 상태 ============== */
let allRows = [];
let activeCatFilter = "all";
let searchTerm = "";
let sortKey = null;
let sortDir = 1;

/* ============== CSV 파서 ============== */
function parseCSV(text){
  const rows = [];
  let i=0, field='', row=[], inQuotes=false;
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field+='"'; i+=2; continue; }
        inQuotes=false; i++; continue;
      }
      field += c; i++; continue;
    } else {
      if(c === '"'){ inQuotes=true; i++; continue; }
      if(c === ','){ row.push(field); field=''; i++; continue; }
      if(c === '\r'){ i++; continue; }
      if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
      field += c; i++; continue;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const header = rows[0];
  return rows.slice(1).filter(r => r.length > 1 || (r[0] && r[0].trim() !== '')).map(r => {
    const obj = {};
    header.forEach((h,idx) => obj[h.trim()] = (r[idx] !== undefined ? r[idx] : '').trim());
    return obj;
  });
}

function num(v){
  if(v === null || v === undefined || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

/* ============== 데이터 로드 ============== */
async function loadData(){
  document.getElementById('subhead').textContent = '데이터 불러오는 중…';
  if(SHEET_CSV_URL && SHEET_CSV_URL.trim() !== ""){
    try{
      const res = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
      if(!res.ok) throw new Error('fetch failed: ' + res.status);
      const text = await res.text();
      allRows = parseCSV(text);
      document.getElementById('sourceLabel').textContent = 'Sheets 연동';
      document.getElementById('sourcePill').classList.add('live');
    }catch(e){
      console.error(e);
      allRows = parseCSV(EMBEDDED_CSV);
      document.getElementById('sourceLabel').textContent = '연동 실패 — 로컬 표시';
      document.getElementById('sourcePill').classList.remove('live');
    }
  } else {
    allRows = parseCSV(EMBEDDED_CSV);
    document.getElementById('sourceLabel').textContent = '로컬 데이터';
    document.getElementById('sourcePill').classList.remove('live');
  }
  render();
}

/* ============== 렌더링 ============== */
function render(){
  const rows = allRows;
  document.getElementById('subhead').textContent = `총 ${rows.length}건 · 6단계 파이프라인 추적`;
  renderKPIs(rows);
  renderPipeline(rows);
  renderFilters(rows);
  renderCards();
}

function renderKPIs(rows){
  let totalKR = 0, totalALL = 0;
  let activeCount = 0;
  let completeCount = 0;
  rows.forEach(r => {
    const kr = num(r['효과금액_한국법인']);
    const all = num(r['효과금액_전체법인']);
    if(kr !== null) totalKR += kr;
    if(all !== null) totalALL += all;
    const stage = num(r['현재단계번호']);
    if(stage === 6) completeCount++;
    if(stage !== null && stage < 6) activeCount++;
  });
  const kpis = [
    {label:'한국법인', value: totalKR.toFixed(1), unit:'억', accent:'clay', note:'연간 절감'},
    {label:'전체법인', value: totalALL.toFixed(1), unit:'억', accent:'orion', note:'연간 절감'},
    {label:'진행과제', value: activeCount, unit:'건', accent:'wheat', note:'1~5단계'},
    {label:'완료과제', value: completeCount, unit:'건', accent:'moss', note:'6단계'},
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k => `
    <div class="kpi ${k.accent}">
      <div class="label">${k.label}</div>
      <div class="value">${k.value}<span class="unit">${k.unit}</span></div>
      <div class="footnote">${k.note}</div>
    </div>
  `).join('');
}

function renderPipeline(rows){
  const counts = STAGES.map(()=>0);
  rows.forEach(r => {
    const s = num(r['현재단계번호']);
    if(s !== null && s >= 1 && s <= 6) counts[s-1]++;
  });
  const total = rows.length || 1;
  document.getElementById('pipelineRow').innerHTML = STAGES.map((name, idx) => {
    const c = counts[idx];
    const pct = Math.round((c/total)*100);
    return `
      <div class="stage s${idx+1}">
        <div class="num">STEP ${idx+1}</div>
        <div class="name">${name}</div>
        <div class="count">${c}<span class="of"> / ${total}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

function renderFilters(rows){
  const cats = [...new Set(rows.map(r => r['과제구분']).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.querySelectorAll('.chip[data-filter]:not([data-filter="all"])').forEach(e => e.remove());
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.filter = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCatFilter = cat;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderCards();
    });
    bar.appendChild(btn);
  });
  const allBtn = bar.querySelector('[data-filter="all"]');
  allBtn.onclick = () => {
    activeCatFilter = 'all';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    allBtn.classList.add('active');
    renderCards();
  };
}

function getFilteredSorted(){
  let rows = allRows.filter(r => {
    if(activeCatFilter !== 'all' && r['과제구분'] !== activeCatFilter) return false;
    if(searchTerm){
      const hay = (r['과제명']+' '+r['구매담당자']+' '+(r['연구소담당자']||'')+' '+r['관리번호']+' '+r['진행현황']).toLowerCase();
      if(!hay.includes(searchTerm.toLowerCase())) return false;
    }
    return true;
  });
  if(sortKey){
    rows = rows.slice().sort((a,b) => {
      let av = a[sortKey], bv = b[sortKey];
      const an = num(av), bn = num(bv);
      if(an !== null && bn !== null){ return (an-bn)*sortDir; }
      av = (av||'').toString(); bv = (bv||'').toString();
      return av.localeCompare(bv, 'ko') * sortDir;
    });
  }
  return rows;
}

function renderCards(){
  const rows = getFilteredSorted();
  document.getElementById('rowCountHint').textContent = `${rows.length}건`;
  const list = document.getElementById('cardList');
  const empty = document.getElementById('emptyState');
  if(!rows.length){
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = rows.map(r => {
    const stageNum = num(r['현재단계번호']) || 0;
    const stageName = r['현재단계명'] || '';
    const pips = STAGES.map((_,i) => `<i class="${i < stageNum ? 'on p'+(i+1) : ''}"></i>`).join('');
    const kr = num(r['효과금액_한국법인']);
    const all = num(r['효과금액_전체법인']);
    const krClass = kr === null ? '' : (kr < 0 ? 'neg' : (kr > 0 ? 'pos':'zero'));
    const allClass = all === null ? '' : (all < 0 ? 'neg' : (all > 0 ? 'pos':'zero'));
    const catSafe = (r['과제구분']||'').replace(/[^가-힣A-Za-z0-9]/g,'');
    const labPerson = (r['연구소담당자']||'').trim();
    const labHtml = labPerson ? escapeHtml(labPerson) : '<span class="unassigned">미정</span>';
    return `
      <div class="task-card">
        <div class="card-top">
          <span class="card-no">#${r['No']||''}</span>
          <span class="card-title">${escapeHtml(r['과제명']||'')}</span>
          <span class="badge cat-${catSafe}">${escapeHtml(r['과제구분']||'')}</span>
        </div>
        <div class="card-meta">
          <span class="meta-item"><span class="meta-label">구매</span>${escapeHtml(r['구매담당자']||'')}</span>
          <span class="meta-item"><span class="meta-label">연구소</span>${labHtml}</span>
        </div>
        <div class="card-stage">
          <div class="stage-pip" title="${escapeHtml(stageName)}">${pips}</div>
          <span class="stage-label">${escapeHtml(stageName)}</span>
        </div>
        <div class="card-amounts">
          <div class="amt-box">
            <div class="amt-label">한국법인 (억원)</div>
            <div class="amt-value ${krClass}">${kr === null ? '—' : kr.toFixed(1)}</div>
          </div>
          <div class="amt-box">
            <div class="amt-label">전체법인 (억원)</div>
            <div class="amt-value ${allClass}">${all === null ? '—' : all.toFixed(1)}</div>
          </div>
        </div>
        <div class="card-status">${escapeHtml(r['진행현황']||'')}</div>
      </div>
    `;
  }).join('');
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ============== 이벤트 ============== */
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderCards();
});
document.getElementById('refreshBtn').addEventListener('click', loadData);
document.querySelectorAll('.sort-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.sort;
    if(sortKey === key){ sortDir *= -1; } else { sortKey = key; sortDir = 1; }
    document.querySelectorAll('.sort-chip').forEach(c => {
      c.classList.remove('active');
      c.querySelector('.arrow')?.remove();
    });
    btn.classList.add('active');
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = sortDir === 1 ? '▲' : '▼';
    btn.appendChild(arrow);
    renderCards();
  });
});

setInterval(loadData, 5*60*1000);

loadData();
</script>
</body>
</html>
